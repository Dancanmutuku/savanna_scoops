{% extends "base.html" %}
{% load static %}

{% block body %}
<div class="flex h-screen overflow-hidden bg-surface-container-low/30">
  {% include "partials/admin_sidebar.html" %}
  
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Admin Header -->
    <header class="h-20 bg-surface/80 backdrop-blur-md border-b border-outline-variant/20 px-8 flex items-center justify-between sticky top-0 z-10">
      <div class="flex flex-col">
        <div class="flex items-center gap-2 text-on-surface-variant text-xs mb-1">
          <span class="opacity-50">Pages</span>
          <span class="opacity-50">/</span>
          <span class="font-medium capitalize">{% block admin_breadcrumb %}Dashboard{% endblock %}</span>
        </div>
        <h2 class="text-xl font-sans font-bold tracking-tight text-on-surface capitalize">{% block admin_title %}Dashboard{% endblock %}</h2>
      </div>

      <div class="flex items-center gap-6">
        <div class="relative group">
          <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search..." class="bg-surface-container-high border-none rounded-full py-2.5 pl-10 pr-4 text-sm w-56 focus:ring-2 focus:ring-primary/20 transition-all outline-none"/>
        </div>
        <div class="flex items-center gap-3">
          <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span class="absolute top-2 right-2 w-2 h-2 bg-tertiary rounded-full border-2 border-surface"></span>
          </button>
          <a href="{% url 'admin:index' %}" class="flex items-center gap-2 px-3 py-2 bg-surface-container-high rounded-lg hover:bg-surface-container-highest transition-colors text-xs font-bold text-on-surface-variant">
            Django Admin
          </a>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div class="max-w-7xl mx-auto w-full">
        {% block admin_content %}{% endblock %}
      </div>
    </main>
  </div>
</div>
{% endblock %}
