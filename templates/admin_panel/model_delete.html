{% extends "admin_panel/base_admin.html" %}
{% block admin_breadcrumb %}System / Delete{% endblock %}
{% block admin_title %}Delete {{ verbose_name }}{% endblock %}
{% block admin_content %}
<form method="post" class="sculpted-card rounded-[2rem] p-8 max-w-xl">
  {% csrf_token %}
  <p class="text-lg font-bold">Delete this record?</p>
  <p class="mt-3 text-on-surface-variant">{{ object }}</p>
  <div class="flex gap-3 pt-8">
    <button class="px-6 py-3 bg-tertiary text-white rounded-2xl font-bold">Delete</button>
    <a href="{% url 'admin_model_list' app_label model_name %}" class="px-6 py-3 bg-surface-container-high rounded-2xl font-bold">Cancel</a>
  </div>
</form>
{% endblock %}
