<footer class="mt-10 border-t border-outline-variant/20 bg-surface/80">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <p class="font-sans font-black text-on-surface">Savanna Scoops</p>
        <p class="text-xs text-on-surface-variant mt-1">{{ site_settings.address|default:"Westlands, Nairobi" }}</p>
      </div>
      <div class="flex flex-wrap items-center gap-3 text-xs font-bold text-on-surface-variant">
        <a href="{% url 'shop' %}" class="hover:text-secondary">Shop</a>
        {% if user.is_authenticated %}
          <a href="{% url 'my_orders' %}" class="hover:text-secondary">My Orders</a>
        {% endif %}
        <a href="{% url 'about' %}" class="hover:text-secondary">About</a>
        <span class="text-outline-variant">|</span>
        <span>{{ site_settings.phone|default:"+254 700 123 456" }}</span>
        <span class="hidden sm:inline">{{ site_settings.email|default:"hello@savanascoops.co.ke" }}</span>
      </div>
    </div>
  </div>
</footer>
