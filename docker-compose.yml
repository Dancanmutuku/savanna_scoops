name: savanna-scoops

services:
  web:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-savanna-scoops-docker-dev-key}
      DEBUG: ${DOCKER_DEBUG:-True}
      ALLOWED_HOSTS: ${DOCKER_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      CSRF_TRUSTED_ORIGINS: ${DOCKER_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-savanna_scoops}:${POSTGRES_PASSWORD:-savanna_scoops}@db:5432/${POSTGRES_DB:-savanna_scoops}
      DATABASE_SSLMODE: disable
      BOOTSTRAP_DATA: ${BOOTSTRAP_DATA:-1}
      SEED_DATA: ${SEED_DATA:-0}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-174379}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL:-http://localhost:8000/payments/mpesa/callback/}
      MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT:-sandbox}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@example.com}
      DEFAULT_FROM_NAME: ${DEFAULT_FROM_NAME:-Savanna Scoops}
      EMAIL_DELIVERY_BACKEND: ${EMAIL_DELIVERY_BACKEND:-smtp}
      EMAIL_SEND_ASYNC: ${EMAIL_SEND_ASYNC:-False}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_API_URL: ${BREVO_API_URL:-https://api.brevo.com/v3/smtp/email}
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-savanna_scoops}
      POSTGRES_USER: ${POSTGRES_USER:-savanna_scoops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-savanna_scoops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  staticfiles:
  media:
